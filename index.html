var DATI_EDITORI = { editori: [] };
var DATI_PDE = { camere: [] }; // [{nome, notti:[]}]
var isSaving = false;
var tabAttivo = "editori";
var fEditore = "";
var fCamere = [{ nome: "", notti: [] }];
var editoreInModifica = -1;

function showToast(msg, type) {
  var t = document.getElementById("toast");
  t.textContent = msg; t.style.display = "block";
  t.style.background = type==="err" ? "#4a1a1a" : "#1a3a2a";
  t.style.border = type==="err" ? "1px solid #cc4444" : "1px solid #4acd7a";
  t.style.color = type==="err" ? "#ff8888" : "#4acd7a";
  clearTimeout(t._tid); t._tid = setTimeout(function(){ t.style.display="none"; }, 2800);
}

function setSaving(v) {
  isSaving = v;
  document.getElementById("saving").style.display = v ? "block" : "none";
}

// ===================== CARICAMENTO =====================
function caricaDati() {
  document.getElementById("root").innerHTML = '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:80vh;gap:16px;color:#3d6bc4"><div style="font-size:2.5rem">📚</div><div>Caricamento...</div></div>';
  var binId = tabAttivo === "pde" ? BIN_ID_PDE : BIN_ID_EDITORI;
  fetch("https://api.jsonbin.io/v3/b/" + binId + "/latest", { headers: { "X-Master-Key": API_KEY, "X-Bin-Meta": "false" } })
    .then(function(r){ return r.json(); })
    .then(function(d){
      if(tabAttivo === "pde") { DATI_PDE = (d && d.camere) ? d : { camere: [] }; }
      else { DATI_EDITORI = (d && d.editori) ? d : { editori: [] }; }
      render();
    })
    .catch(function(){ render(); });
}

function salvaDati(cb) {
  setSaving(true);
  var binId = tabAttivo === "pde" ? BIN_ID_PDE : BIN_ID_EDITORI;
  var body = tabAttivo === "pde" ? DATI_PDE : DATI_EDITORI;
  fetch("https://api.jsonbin.io/v3/b/" + binId, {
    method: "PUT",
    headers: { "Content-Type": "application/json", "X-Master-Key": API_KEY },
    body: JSON.stringify(body)
  })
  .then(function(){ setSaving(false); if(cb) cb(); })
  .catch(function(){ setSaving(false); showToast("Errore salvataggio","err"); });
}

function silentRefresh() {
  if(isSaving) return;
  var binId = tabAttivo === "pde" ? BIN_ID_PDE : BIN_ID_EDITORI;
  fetch("https://api.jsonbin.io/v3/b/" + binId + "/latest", { headers: { "X-Master-Key": API_KEY, "X-Bin-Meta": "false" } })
    .then(function(r){ return r.json(); })
    .then(function(d){
      if(!isSaving){
        if(tabAttivo === "pde") { DATI_PDE = (d && d.camere) ? d : { camere: [] }; }
        else { DATI_EDITORI = (d && d.editori) ? d : { editori: [] }; }
        if(tabAttivo === "pde") renderTabPDE(); else renderTabEditori();
      }
    })
    .catch(function(){});
}

function switchTab(tab) {
  tabAttivo = tab;
  caricaDati();
}

// ===================== TAB EDITORI =====================
function toggleNotte(idx, notte) {
  var c = fCamere[idx];
  var i = c.notti.indexOf(notte);
  if(i >= 0) c.notti.splice(i, 1); else c.notti.push(notte);
  renderForm();
}

function selezionaTutteNotti(idx) {
  fCamere[idx].notti = NOTTI.slice();
  renderForm();
}

function syncNome(idx, val) { fCamere[idx].nome = val; }
function syncEditore(val) { fEditore = val; }

function aggiungiCamera() {
  fCamere.push({ nome: "", notti: [] });
  renderForm();
  setTimeout(function(){
    var inputs = document.querySelectorAll(".inp-cam");
    if(inputs.length) inputs[inputs.length-1].focus();
  }, 50);
}

function rimuoviCameraForm(idx) {
  if(fCamere.length === 1) { fCamere[0] = { nome: "", notti: [] }; renderForm(); return; }
  fCamere.splice(idx, 1); renderForm();
}

function salvaEditore() {
  var nome = fEditore.trim();
  if(!nome){ showToast("Inserisci il nome dell'editore","err"); return; }
  var valide = fCamere.filter(function(c){ return c.nome.trim() && c.notti.length > 0; });
  if(valide.length === 0){ showToast("Aggiungi almeno una camera con le notti selezionate","err"); return; }
  var existing = null;
  for(var i = 0; i < DATI_EDITORI.editori.length; i++){
    if(DATI_EDITORI.editori[i].nome.toUpperCase() === nome.toUpperCase()){ existing = DATI_EDITORI.editori[i]; break; }
  }
  var nuoveCamere = valide.map(function(c){ return { nome: c.nome.trim(), notti: c.notti.slice() }; });
  if(existing){ for(var j=0;j<nuoveCamere.length;j++) existing.camere.push(nuoveCamere[j]); }
  else { DATI_EDITORI.editori.push({ nome: nome.toUpperCase(), camere: nuoveCamere }); }
  salvaDati(function(){ showToast("Salvato ✓"); fEditore = ""; fCamere = [{ nome: "", notti: [] }]; render(); });
}

function modificaEditore(idx) {
  var ed = DATI_EDITORI.editori[idx];
  fEditore = ed.nome;
  fCamere = ed.camere.map(function(c){ return { nome: c.nome, notti: c.notti.slice() }; });
  editoreInModifica = idx;
  var el = document.getElementById("form-section");
  if(el) el.scrollIntoView({ behavior: "smooth" });
  renderForm();
}

function salvaModifica() {
  var nome = fEditore.trim();
  if(!nome){ showToast("Inserisci il nome dell'editore","err"); return; }
  var valide = fCamere.filter(function(c){ return c.nome.trim() && c.notti.length > 0; });
  if(valide.length === 0){ showToast("Aggiungi almeno una camera","err"); return; }
  DATI_EDITORI.editori[editoreInModifica] = { nome: nome.toUpperCase(), camere: valide.map(function(c){ return { nome: c.nome.trim(), notti: c.notti.slice() }; }) };
  salvaDati(function(){ showToast("Modifiche salvate ✓"); fEditore = ""; fCamere = [{ nome: "", notti: [] }]; editoreInModifica = -1; render(); });
}

function annullaModifica() {
  fEditore = ""; fCamere = [{ nome: "", notti: [] }]; editoreInModifica = -1; renderForm();
}

function rimuoviEditore(idx) {
  if(!confirm("Rimuovere " + DATI_EDITORI.editori[idx].nome + "?")) return;
  DATI_EDITORI.editori.splice(idx, 1);
  salvaDati(function(){ render(); showToast("Editore rimosso"); });
}

function rimuoviCameraEditore(edIdx, camIdx) {
  DATI_EDITORI.editori[edIdx].camere.splice(camIdx, 1);
  if(DATI_EDITORI.editori[edIdx].camere.length === 0) DATI_EDITORI.editori.splice(edIdx, 1);
  salvaDati(function(){ render(); showToast("Rimosso"); });
}

function renderForm() {
  var el = document.getElementById("form-section");
  if(!el) return;
  var camereHTML = "";
  for(var i = 0; i < fCamere.length; i++){
    var c = fCamere[i];
    var nottiHTML = "";
    for(var n = 0; n < NOTTI.length; n++){
      var sel = c.notti.indexOf(NOTTI[n]) >= 0;
      nottiHTML += "<button onclick=\"toggleNotte(" + i + ",'" + NOTTI[n] + "')\" style=\"border:1px solid " + (sel?"#4acd7a":"#2a3a5a") + ";border-radius:6px;padding:5px 11px;background:" + (sel?"#1a3a2a":"#0f1923") + ";color:" + (sel?"#4acd7a":"#4a6a9a") + ";font-size:.78rem;font-weight:" + (sel?"bold":"normal") + "\">" + NOTTI[n] + "</button>";
    }
    var totN = c.notti.length;
    camereHTML += "<div style=\"background:#0f1923;border:1px solid #1a2a4a;border-radius:10px;padding:14px 16px;margin-bottom:10px;position:relative\">"
      + (fCamere.length > 1 ? "<button onclick=\"rimuoviCameraForm(" + i + ")\" style=\"position:absolute;top:8px;right:10px;background:none;border:none;color:#4a5a6a;font-size:1.1rem\">x</button>" : "")
      + "<div style=\"font-size:.7rem;color:#3d6bc4;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px\">Camera " + (i+1) + "</div>"
      + "<input class=\"inp-cam\" type=\"text\" placeholder=\"Nome e cognome...\" value=\"" + c.nome + "\" oninput=\"syncNome(" + i + ",this.value)\" style=\"width:100%;background:#162030;border:1px solid #1a2a4a;border-radius:7px;padding:9px 12px;color:#e8e0d5;font-size:.9rem;margin-bottom:10px\"/>"
      + "<div style=\"display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:" + (totN>0?"8px":"0") + "\">" + nottiHTML
      + "<button onclick=\"selezionaTutteNotti(" + i + ")\" style=\"border:1px solid #3d6bc4;border-radius:6px;padding:5px 11px;background:#0a1020;color:#3d6bc4;font-size:.75rem\">Seleziona tutte</button>"
      + "</div>"
      + (totN > 0 ? "<div style=\"font-size:.75rem;color:#8ab4d4\">Totale: <strong>" + totN + " " + (totN===1?"notte":"notti") + "</strong></div>" : "")
      + "</div>";
  }
  el.innerHTML = "<div style=\"font-size:.75rem;color:#3d6bc4;letter-spacing:2px;text-transform:uppercase;margin-bottom:12px\">" + (editoreInModifica >= 0 ? "Modifica Editore" : "Nuovo Editore") + "</div>"
    + "<input id=\"inp-editore\" type=\"text\" placeholder=\"Nome editore (es. ABOCA)...\" value=\"" + fEditore + "\" oninput=\"syncEditore(this.value)\" style=\"width:100%;background:#0f1923;border:1px solid #1a2a4a;border-radius:8px;padding:10px 14px;color:#e8e0d5;font-size:1rem;margin-bottom:14px\"/>"
    + camereHTML
    + "<div style=\"display:flex;gap:10px;flex-wrap:wrap;margin-top:6px\">"
    + "<button onclick=\"aggiungiCamera()\" style=\"background:#162030;border:1px solid #3d6bc4;border-radius:8px;padding:9px 18px;color:#3d6bc4;font-size:.85rem\">+ Aggiungi camera</button>"
    + (editoreInModifica >= 0
      ? "<button onclick=\"salvaModifica()\" style=\"background:#3d6bc4;border:none;border-radius:8px;padding:9px 24px;color:#fff;font-size:.9rem;font-weight:bold\">Salva modifiche</button><button onclick=\"annullaModifica()\" style=\"background:none;border:1px solid #3a4a5a;border-radius:8px;padding:9px 18px;color:#5a7a9a;font-size:.85rem\">Annulla</button>"
      : "<button onclick=\"salvaEditore()\" style=\"background:#3d6bc4;border:none;border-radius:8px;padding:9px 24px;color:#fff;font-size:.9rem;font-weight:bold\">Salva</button>")
    + "</div>";
}

function renderTabEditori() {
  var totCamere = 0, totNotti = 0;
  for(var i=0;i<DATI_EDITORI.editori.length;i++){
    totCamere += DATI_EDITORI.editori[i].camere.length;
    for(var j=0;j<DATI_EDITORI.editori[i].camere.length;j++) totNotti += DATI_EDITORI.editori[i].camere[j].notti.length;
  }

  // Riepilogo notti
  var riepilogoHTML = "";
  for(var n=0;n<NOTTI.length;n++){
    var tot = 0;
    for(var i=0;i<DATI_EDITORI.editori.length;i++) for(var j=0;j<DATI_EDITORI.editori[i].camere.length;j++) if(DATI_EDITORI.editori[i].camere[j].notti.indexOf(NOTTI[n])>=0) tot++;
    riepilogoHTML += "<div style=\"flex:1;min-width:110px;background:#162030;border:1px solid #2a4a8a44;border-radius:10px;padding:12px 16px;text-align:center\">"
      + "<div style=\"font-size:.72rem;color:#6a8aaa;margin-bottom:6px\">" + NOTTI[n] + "</div>"
      + "<div style=\"font-size:1.8rem;font-weight:bold;color:#3d6bc4;line-height:1\">" + tot + "</div>"
      + "<div style=\"font-size:.68rem;color:#4a6a9a;margin-top:4px\">" + (tot===1?"camera":"camere") + "</div>"
      + "</div>";
  }

  // Lista editori
  var listaHTML = "";
  if(DATI_EDITORI.editori.length === 0){
    listaHTML = "<div style=\"color:#3a5a7a;font-style:italic;font-size:.9rem;text-align:center;padding:30px 0\">Nessun editore ancora</div>";
  } else {
    for(var i=0;i<DATI_EDITORI.editori.length;i++){
      var ed = DATI_EDITORI.editori[i];
      var edNotti = 0;
      var camereHTML = "";
      for(var j=0;j<ed.camere.length;j++){
        var cam = ed.camere[j];
        edNotti += cam.notti.length;
        var tags = cam.notti.map(function(x){ return "<span style=\"background:#1a3a2a;color:#4acd7a;border-radius:4px;padding:2px 8px;font-size:.72rem\">" + x + "</span>"; }).join(" ");
        camereHTML += "<div style=\"display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:#0f1923;border-radius:8px;margin-bottom:6px;gap:10px\">"
          + "<div style=\"flex:1\">"
          + "<div style=\"display:flex;align-items:center;gap:8px;margin-bottom:5px\">"
          + "<span style=\"font-size:.92rem;color:#e8e0d5;font-weight:bold\">" + cam.nome + "</span>"
          + "<span style=\"background:#1a2a3a;color:#8ab4d4;border-radius:10px;padding:1px 9px;font-size:.72rem\">" + cam.notti.length + " " + (cam.notti.length===1?"notte":"notti") + "</span>"
          + "</div>"
          + "<div style=\"display:flex;flex-wrap:wrap;gap:4px\">" + tags + "</div>"
          + "</div>"
          + "<button onclick=\"rimuoviCameraEditore(" + i + "," + j + ")\" style=\"background:none;border:1px solid #3a4a5a;border-radius:4px;color:#5a6a7a;font-size:.7rem;padding:2px 7px;flex-shrink:0\">X</button>"
          + "</div>";
      }
      listaHTML += "<div style=\"background:#162030;border:1px solid #2a4a8a44;border-left:4px solid #3d6bc4;border-radius:12px;margin-bottom:16px;overflow:hidden\">"
        + "<div style=\"padding:14px 20px 10px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px\">"
        + "<div style=\"font-size:1.15rem;font-weight:bold;color:#e8e0d5\">" + ed.nome + "</div>"
        + "<div style=\"display:flex;align-items:center;gap:8px\">"
        + "<span style=\"background:#1a2030;color:#8ab4d4;border-radius:10px;padding:2px 10px;font-size:.75rem\">" + ed.camere.length + " " + (ed.camere.length===1?"camera":"camere") + " · " + edNotti + " " + (edNotti===1?"notte":"notti") + "</span>"
        + "<button onclick=\"modificaEditore(" + i + ")\" style=\"background:none;border:1px solid #2a4a8a;border-radius:4px;color:#3d6bc4;font-size:.7rem;padding:2px 8px\">Modifica</button>"
        + "<button onclick=\"rimuoviEditore(" + i + ")\" style=\"background:none;border:1px solid #4a2a2a;border-radius:4px;color:#7a4a4a;font-size:.7rem;padding:2px 8px\">Rimuovi</button>"
        + "</div></div>"
        + "<div style=\"padding:0 16px 14px\">" + camereHTML + "</div>"
        + "</div>";
    }
  }

  document.getElementById("tab-content").innerHTML =
    "<div style=\"background:#0a1020;border:1px solid #2a4a8a33;border-radius:12px;padding:16px 20px;margin-bottom:24px\">"
    + "<div style=\"font-size:.75rem;color:#3d6bc4;letter-spacing:2px;text-transform:uppercase;margin-bottom:12px\">Riepilogo notti generale</div>"
    + "<div style=\"display:flex;flex-wrap:wrap;gap:10px\">" + riepilogoHTML + "</div>"
    + "</div>"
    + "<div style=\"background:#0a1020;border:1px solid #2a4a8a33;border-left:4px solid #3d6bc4;border-radius:12px;padding:20px;margin-bottom:28px\" id=\"form-section\"></div>"
    + "<div style=\"font-size:.75rem;color:#3d6bc4;letter-spacing:2px;text-transform:uppercase;margin-bottom:14px\">Editori registrati</div>"
    + listaHTML;

  renderForm();
}

// ===================== TAB PDE =====================
function toggleNottePDE(nomePersona, notte) {
  var found = null;
  for(var i=0;i<DATI_PDE.camere.length;i++) if(DATI_PDE.camere[i].nome===nomePersona){ found=DATI_PDE.camere[i]; break; }
  if(!found){ found={nome:nomePersona,notti:[]}; DATI_PDE.camere.push(found); }
  var idx = found.notti.indexOf(notte);
  if(idx>=0) found.notti.splice(idx,1); else found.notti.push(notte);
  salvaDati(function(){ renderTabPDE(); });
}

function selezionaTuttePDE(nomePersona) {
  var found = null;
  for(var i=0;i<DATI_PDE.camere.length;i++) if(DATI_PDE.camere[i].nome===nomePersona){ found=DATI_PDE.camere[i]; break; }
  if(!found){ found={nome:nomePersona,notti:[]}; DATI_PDE.camere.push(found); }
  found.notti = NOTTI.slice();
  salvaDati(function(){ renderTabPDE(); });
}

function deselezionaTuttePDE(nomePersona) {
  for(var i=0;i<DATI_PDE.camere.length;i++) if(DATI_PDE.camere[i].nome===nomePersona){ DATI_PDE.camere[i].notti=[]; break; }
  salvaDati(function(){ renderTabPDE(); });
}

function getNottiPDE(nomePersona) {
  for(var i=0;i<DATI_PDE.camere.length;i++) if(DATI_PDE.camere[i].nome===nomePersona) return DATI_PDE.camere[i].notti;
  return [];
}

function renderTabPDE() {
  // Riepilogo notti PDE
  var riepilogoHTML = "";
  for(var n=0;n<NOTTI.length;n++){
    var tot = 0;
    for(var i=0;i<DATI_PDE.camere.length;i++) if(DATI_PDE.camere[i].notti.indexOf(NOTTI[n])>=0) tot++;
    riepilogoHTML += "<div style=\"flex:1;min-width:110px;background:#162030;border:1px solid #2a4a8a44;border-radius:10px;padding:12px 16px;text-align:center\">"
      + "<div style=\"font-size:.72rem;color:#6a8aaa;margin-bottom:6px\">" + NOTTI[n] + "</div>"
      + "<div style=\"font-size:1.8rem;font-weight:bold;color:#3d6bc4;line-height:1\">" + tot + "</div>"
      + "<div style=\"font-size:.68rem;color:#4a6a9a;margin-top:4px\">" + (tot===1?"persona":"persone") + "</div>"
      + "</div>";
  }

  // Lista persone PDE
  var personeHTML = "";
  for(var p=0;p<PERSONE_PDE.length;p++){
    var nome = PERSONE_PDE[p];
    var notti = getNottiPDE(nome);
    var nottiHTML = "";
    for(var n=0;n<NOTTI.length;n++){
      var sel = notti.indexOf(NOTTI[n]) >= 0;
      nottiHTML += "<button onclick=\"toggleNottePDE('" + nome.replace(/'/g,"\\'") + "','" + NOTTI[n] + "')\" style=\"border:1px solid " + (sel?"#4acd7a":"#2a3a5a") + ";border-radius:6px;padding:5px 11px;background:" + (sel?"#1a3a2a":"#0f1923") + ";color:" + (sel?"#4acd7a":"#4a6a9a") + ";font-size:.78rem;font-weight:" + (sel?"bold":"normal") + "\">" + NOTTI[n] + "</button>";
    }
    var tutteSelezionate = notti.length === NOTTI.length;
    personeHTML += "<div style=\"background:#162030;border:1px solid #1a2a4a;border-radius:10px;padding:14px 16px;margin-bottom:10px\">"
      + "<div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:6px\">"
      + "<div style=\"font-size:.95rem;font-weight:bold;color:#e8e0d5\">" + nome + "</div>"
      + "<div style=\"display:flex;align-items:center;gap:8px\">"
      + (notti.length > 0 ? "<span style=\"background:#1a2a3a;color:#8ab4d4;border-radius:10px;padding:1px 9px;font-size:.72rem\">" + notti.length + " " + (notti.length===1?"notte":"notti") + "</span>" : "")
      + "</div></div>"
      + "<div style=\"display:flex;flex-wrap:wrap;gap:6px;align-items:center\">"
      + nottiHTML
      + "<button onclick=\"" + (tutteSelezionate ? "deselezionaTuttePDE" : "selezionaTuttePDE") + "('" + nome.replace(/'/g,"\\'") + "')\" style=\"border:1px solid #3d6bc4;border-radius:6px;padding:5px 11px;background:#0a1020;color:#3d6bc4;font-size:.75rem\">"
      + (tutteSelezionate ? "Deseleziona tutte" : "Seleziona tutte") + "</button>"
      + "</div>"
      + "</div>";
  }

  document.getElementById("tab-content").innerHTML =
    "<div style=\"background:#0a1020;border:1px solid #2a4a8a33;border-radius:12px;padding:16px 20px;margin-bottom:24px\">"
    + "<div style=\"font-size:.75rem;color:#3d6bc4;letter-spacing:2px;text-transform:uppercase;margin-bottom:12px\">Riepilogo notti generale</div>"
    + "<div style=\"display:flex;flex-wrap:wrap;gap:10px\">" + riepilogoHTML + "</div>"
    + "</div>"
    + "<div style=\"font-size:.75rem;color:#3d6bc4;letter-spacing:2px;text-transform:uppercase;margin-bottom:14px\">Team PDE</div>"
    + personeHTML;
}

// ===================== RENDER PRINCIPALE =====================
function render() {
  var totEditori = DATI_EDITORI.editori.length;
  var totPDE = DATI_PDE.camere.filter(function(c){ return c.notti.length > 0; }).length;

  document.getElementById("root").innerHTML =
    "<div style=\"background:linear-gradient(135deg,#1a3a7a,#2a4a9a);border-bottom:1px solid #1a3a7a;padding:20px 24px 0\">"
    + "<div style=\"max-width:860px;margin:0 auto\">"
    + "<div style=\"display:flex;align-items:center;gap:16px;margin-bottom:16px\">"
    + "<img src=\"" + LOGO + "\" style=\"height:48px;background:white;border-radius:6px;padding:4px 8px;\"/>"
    + "<div>"
    + "<div style=\"font-size:1.4rem;font-weight:bold;color:#fff\">Strenne 2026 - Paestum</div>"
    + "<div style=\"font-size:.75rem;color:#aac4ee;letter-spacing:2px;text-transform:uppercase\">Maggio 2026</div>"
    + "</div></div>"
    + "<div style=\"display:flex;align-items:center;gap:4px\">"
    + "<button class=\"tab-btn " + (tabAttivo==="editori"?"active":"") + "\" onclick=\"switchTab('editori')\">Editori</button>"
    + "<button class=\"tab-btn " + (tabAttivo==="pde"?"active":"") + "\" onclick=\"switchTab('pde')\">Camere PDE</button>"
    + "<div style=\"flex:1\"></div>"
    + "<button onclick=\"caricaDati()\" style=\"background:none;border:1px solid #4a6aaa;border-radius:6px;color:#aac4ee;font-size:.72rem;padding:3px 10px;margin-bottom:8px\">↻</button>"
    + "<button onclick=\"esportaExcel()\" style=\"background:#1a2a5a;border:1px solid #4acd7a;border-radius:6px;color:#4acd7a;font-size:.72rem;padding:3px 10px;margin-bottom:8px;margin-left:6px\">⬇ Excel</button>"
    + "</div></div></div>"
    + "<div style=\"max-width:860px;margin:0 auto;padding:20px 16px 0\" id=\"tab-content\"></div>";

  if(tabAttivo === "pde") renderTabPDE();
  else renderTabEditori();
}

function esportaExcel() {
  var wb = XLSX.utils.book_new();

  // Sheet editori
  var righe1 = [["Editore","Nome","4/5 mag","5/6 mag","6/7 mag","7/8 mag","Totale notti"]];
  for(var i=0;i<DATI_EDITORI.editori.length;i++){
    var ed = DATI_EDITORI.editori[i];
    for(var j=0;j<ed.camere.length;j++){
      var cam = ed.camere[j];
      righe1.push([ed.nome, cam.nome,
        cam.notti.indexOf("4/5 mag")>=0?"X":"",
        cam.notti.indexOf("5/6 mag")>=0?"X":"",
        cam.notti.indexOf("6/7 mag")>=0?"X":"",
        cam.notti.indexOf("7/8 mag")>=0?"X":"",
        cam.notti.length]);
    }
  }
  var ws1 = XLSX.utils.aoa_to_sheet(righe1);
  ws1["!cols"] = [{wch:25},{wch:25},{wch:10},{wch:10},{wch:10},{wch:10},{wch:12}];
  XLSX.utils.book_append_sheet(wb, ws1, "Editori");

  // Sheet PDE
  var righe2 = [["Nome","4/5 mag","5/6 mag","6/7 mag","7/8 mag","Totale notti"]];
  for(var p=0;p<PERSONE_PDE.length;p++){
    var notti = getNottiPDE(PERSONE_PDE[p]);
    righe2.push([PERSONE_PDE[p],
      notti.indexOf("4/5 mag")>=0?"X":"",
      notti.indexOf("5/6 mag")>=0?"X":"",
      notti.indexOf("6/7 mag")>=0?"X":"",
      notti.indexOf("7/8 mag")>=0?"X":"",
      notti.length]);
  }
  var ws2 = XLSX.utils.aoa_to_sheet(righe2);
  ws2["!cols"] = [{wch:25},{wch:10},{wch:10},{wch:10},{wch:10},{wch:12}];
  XLSX.utils.book_append_sheet(wb, ws2, "Camere PDE");

  XLSX.writeFile(wb, "Strenne_Paestum_2026.xlsx");
  showToast("File Excel scaricato");
}

caricaDati();
setInterval(silentRefresh, 5000);
